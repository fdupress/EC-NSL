name: EC-NSL Verify Files

on:
  push:
    branches:
      - main

env:
  OPAMROOT: /home/charlie/.opam
  OPAMYES: true
  OPAMJOBS: 2
  ECRJOBS: 1

jobs:
  ec:
    name: Easycrypt Proof Checking
    runs-on: ubuntu-24.04
    container:
      image: docker:29-cli
    strategy:
      fail-fast: false
    steps:
    - uses: actions/checkout@v6
    - name: Do some recon
      run: |
        ls -R .
        pwd
    - name: Compile Project
      run: |
        docker run \
          -v /__w/EC-NSL/EC-NSL:/home/charlie/project:Z \
          ghcr.io/easycrypt/ec-test-box:release \
          sh -c "ls -R . && opam exec -- make -C project check"
