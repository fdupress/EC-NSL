name: EC-NSL Verify Files

on:
  push:
    branches:
      - main

env:
  OPAMROOT: /home/charlie/.opam
  OPAMYES: true
  OPAMJOBS: 2
  ECRJOBS: 1

jobs:
  ec:
    name: Easycrypt Proof Checking
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/easycrypt/ec-test-box:release
    strategy:
      fail-fast: false
    steps:
    - uses: actions/checkout@v6
    - name: Print EasyCrypt configuration
      run: opam exec -- easycrypt config
    - name: Reconfigure why3 just in case
      run: opam exec -- easycrypt why3config
    - name: Compile Project
      run: opam exec -- make check
